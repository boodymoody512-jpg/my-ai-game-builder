<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Builder | Phaser Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Cairo', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        iframe { background: white; border-radius: 12px; min-height: 500px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-400">مصنع ألعاب Phaser الذكي 🚀</h1>
            <p class="text-slate-400 mt-2">ابنِ ألعاب احترافية بضغطة زر واحدة</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-2xl space-y-4">
                <div>
                    <label class="block mb-2 text-sm">اسم اللعبة</label>
                    <input id="p-name" type="text" class="w-full p-2 rounded bg-slate-800 border border-slate-700" placeholder="مثلاً: World War 3">
                </div>
                <div>
                    <label class="block mb-2 text-sm">وصف اللعبة (بالتفصيل)</label>
                    <textarea id="p-desc" rows="5" class="w-full p-2 rounded bg-slate-800 border border-slate-700 text-sm" placeholder="دبابة تتحرك بالأسهم وتضرب نار..."></textarea>
                </div>
                <button onclick="buildGame()" id="build-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">بدء البناء 🏗️</button>
            </div>

            <div class="md:col-span-2 glass p-4 rounded-2xl">
                <div class="flex justify-between mb-4">
                    <span id="status" class="text-green-400 font-bold">جاهز لاستلام مشروعك ✨</span>
                </div>
                <iframe id="output-frame" srcdoc="<h2 style='text-align:center; padding-top:100px;'>شاشة معاينة اللعبة</h2>"></iframe>
            </div>
        </div>
    </div>

    <script>
        async function buildGame() {
            const name = document.getElementById('p-name').value;
            const desc = document.getElementById('p-desc').value;
            const btn = document.getElementById('build-btn');
            const status = document.getElementById('status');

            if(!name || !desc) return alert("من فضلك ادخل الاسم والوصف!");

            btn.disabled = true;
            btn.innerText = "جاري البرمجة... 🤖";
            status.innerText = "جاري استدعاء Phaser والذكاء الاصطناعي...";

            try {
                const response = await fetch('/build', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, details: desc })
                });
                
                const data = await response.json();
                
                // تشغيل اللعبة داخل الـ iframe
                document.getElementById('output-frame').srcdoc = data.code;
                status.innerText = "المشروع جاهز! 🎉";
            } catch (err) {
                status.innerText = "حدث خطأ!";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "بدء البناء 🏗️";
            }
        }
    </script>
</body>
</html>
